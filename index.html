<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 Game Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 800; color: #38bdf8; text-align: center; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; text-align: center; margin-bottom: 24px; font-size: 14px; }
  .nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 24px; }
  .nav button { padding: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: all 0.2s; }
  .nav button.active { background: #38bdf8; color: #0f172a; }
  .nav button:not(.active) { background: #1e293b; color: #94a3b8; }
  .card { background: #1e293b; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid transparent; }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: #334155; }
  .card.selected { border-color: #38bdf8; }
  input, select { width: 100%; padding: 12px; border-radius: 8px; background: #1e293b; color: #f1f5f9; border: 1px solid #334155; font-size: 15px; margin-bottom: 16px; outline: none; }
  input:focus, select:focus { border-color: #38bdf8; }
  .btn { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
  .btn:hover { opacity: 0.9; }
  .btn-outline { width: 100%; padding: 14px; background: transparent; color: #38bdf8; border: 2px solid #38bdf8; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-outline:hover { background: #38bdf8; color: #0f172a; }
  .btn-danger { width: 100%; padding: 14px; background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-danger:hover { background: #ef4444; color: white; }
  .btn-small { padding: 6px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; }
  .btn-add { background: #38bdf8; color: #0f172a; }
  .btn-delete { background: #ef4444; color: white; }
  .btn-edit { background: #f59e0b; color: #0f172a; }
  .btn-save { background: #4ade80; color: #0f172a; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .win { color: #4ade80; font-weight: 700; }
  .loss { color: #f87171; font-weight: 700; }
  .pct { background: #0f172a; border-radius: 6px; padding: 2px 8px; font-weight: 800; color: #38bdf8; }
  .h2h { margin-top: 12px; border-top: 1px solid #334155; padding-top: 12px; }
  .h2h p { color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
  .h2h-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; color: #cbd5e1; }
  .message { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-weight: 600; }
  .message.info { background: #1e40af; color: #bfdbfe; }
  .message.success { background: #14532d; color: #86efac; }
  .message.error { background: #7f1d1d; color: #fca5a5; }
  .empty { text-align: center; color: #94a3b8; padding: 40px; }
  .medal { font-size: 20px; margin-right: 8px; }
  .section-title { color: #38bdf8; font-size: 16px; margin-bottom: 12px; font-weight: 700; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input { margin-bottom: 0; }
  label { color: #94a3b8; font-size: 13px; display: block; margin-bottom: 6px; }
  .tab { display: none; }
  .tab.active { display: block; }
  .bar-bg { background: #0f172a; border-radius: 4px; height: 6px; margin-top: 6px; }
  .bar-fill { background: #38bdf8; border-radius: 4px; height: 6px; transition: width 0.4s; }
  .edit-row { display: flex; gap: 6px; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
  .edit-row select, .edit-row input { margin-bottom: 0; flex: 1; padding: 8px; font-size: 13px; }
  .btn-actions { display: flex; gap: 6px; }
  .divider { border: none; border-top: 1px solid #334155; margin: 20px 0; }
  .stats-box { background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-around; text-align: center; }
  .stats-box div { display: flex; flex-direction: column; }
  .stats-box span:first-child { font-size: 22px; font-weight: 800; color: #38bdf8; }
  .stats-box span:last-child { font-size: 11px; color: #64748b; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>🎱 Game Stats</h1>
  <p class="subtitle">Track wins & losses with your colleagues</p>

  <div id="message" class="message info" style="display:none"></div>

  <div class="nav">
    <button class="active" onclick="switchTab('dashboard', this)">📊 Stats</button>
    <button onclick="switchTab('log', this)">➕ Log</button>
    <button onclick="switchTab('history', this)">📋 History</button>
    <button onclick="switchTab('players', this)">👥 Players</button>
  </div>

  <!-- STATS TAB -->
  <div id="tab-dashboard" class="tab active">
    <div id="summary-box"></div>
    <div class="section-title">🏆 Leaderboard</div>
    <div id="leaderboard"></div>
  </div>

  <!-- LOG MATCH TAB -->
  <div id="tab-log" class="tab">
    <div class="section-title">Log a Match</div>
    <label>🏆 Winner</label>
    <select id="winner"><option value="">Select winner...</option></select>
    <label>💀 Loser</label>
    <select id="loser"><option value="">Select loser...</option></select>
    <button class="btn" onclick="logMatch()">Log Match</button>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="tab">
    <div class="section-title">📋 Match History</div>
    <div id="history-list"></div>
  </div>

  <!-- PLAYERS TAB -->
  <div id="tab-players" class="tab">
    <div class="section-title">Manage Players</div>
    <div class="input-row">
      <input id="newPlayer" placeholder="Player name..." onkeydown="if(event.key==='Enter') addPlayer()">
      <button class="btn-small btn-add" onclick="addPlayer()">Add</button>
    </div>
    <div id="player-list"></div>

    <hr class="divider">
    <div class="section-title">📤 Export & Import</div>

    <button class="btn-outline" onclick="exportData()">📤 Export Data</button>
    <label for="importFile" class="btn-outline" style="display:block; text-align:center; cursor:pointer; padding:14px; border-radius:10px; border: 2px solid #38bdf8; color:#38bdf8; font-weight:800; font-size:16px; margin-bottom:10px;">
      📥 Import Data
    </label>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

    <hr class="divider">
    <button class="btn-danger" onclick="resetData()">🗑️ Reset All Data</button>
  </div>
</div>

<script>
  let data = JSON.parse(localStorage.getItem('gamestats') || '{"players":[],"matches":[]}');
  let editingMatch = null;
  let editingPlayer = null;
  let selectedPlayer = null;

  function save() {
    localStorage.setItem('gamestats', JSON.stringify(data));
  }

  function showMessage(msg, type = 'info') {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = 'message ' + type;
    el.style.display = 'block';
    clearTimeout(window._msgTimer);
    window._msgTimer = setTimeout(() => el.style.display = 'none', 3000);
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    editingMatch = null;
    editingPlayer = null;
    render();
  }

  function getStats(player) {
    const wins = data.matches.filter(m => m.winner === player).length;
    const losses = data.matches.filter(m => m.loser === player).length;
    const total = wins + losses;
    const pct = total === 0 ? 0 : Math.round((wins / total) * 100);
    return { wins, losses, total, pct };
  }

  function getH2H(p1, p2) {
    const p1wins = data.matches.filter(m => m.winner === p1 && m.loser === p2).length;
    const p2wins = data.matches.filter(m => m.winner === p2 && m.loser === p1).length;
    return { p1wins, p2wins };
  }

  function addPlayer() {
    const name = document.getElementById('newPlayer').value.trim();
    if (!name) return;
    if (data.players.find(p => p.toLowerCase() === name.toLowerCase())) {
      showMessage('Player already exists!', 'error'); return;
    }
    data.players.push(name);
    save();
    document.getElementById('newPlayer').value = '';
    showMessage(name + ' added!', 'success');
    render();
  }

  function deletePlayer(name) {
    if (!confirm('Delete ' + name + '? Their match history will be kept.')) return;
    data.players = data.players.filter(p => p !== name);
    save();
    render();
  }

  function startEditPlayer(name) {
    editingPlayer = editingPlayer === name ? null : name;
    render();
    if (editingPlayer) {
      setTimeout(() => {
        const input = document.getElementById('edit-player-' + name);
        if (input) { input.focus(); input.select(); }
      }, 50);
    }
  }

  function saveEditPlayer(oldName) {
    const input = document.getElementById('edit-player-' + oldName);
    const newName = input.value.trim();
    if (!newName) { showMessage('Name cannot be empty!', 'error'); return; }
    if (newName.toLowerCase() !== oldName.toLowerCase() && data.players.find(p => p.toLowerCase() === newName.toLowerCase())) {
      showMessage('Player already exists!', 'error'); return;
    }
    data.players = data.players.map(p => p === oldName ? newName : p);
    data.matches = data.matches.map(m => ({
      ...m,
      winner: m.winner === oldName ? newName : m.winner,
      loser: m.loser === oldName ? newName : m.loser
    }));
    save();
    editingPlayer = null;
    showMessage('Player renamed to ' + newName + '!', 'success');
    render();
  }

  function logMatch() {
    const winner = document.getElementById('winner').value;
    const loser = document.getElementById('loser').value;
    if (!winner || !loser || winner === loser) {
      showMessage('Pick two different players!', 'error'); return;
    }
    data.matches.push({ winner, loser, date: new Date().toLocaleDateString() });
    save();
    document.getElementById('winner').value = '';
    document.getElementById('loser').value = '';
    showMessage('Match logged! ✅', 'success');
    render();
  }

  function deleteMatch(index) {
    if (!confirm('Delete this match?')) return;
    data.matches.splice(index, 1);
    save();
    editingMatch = null;
    render();
  }

  function startEditMatch(index) {
    editingMatch = editingMatch === index ? null : index;
    render();
  }

  function saveEditMatch(index) {
    const newWinner = document.getElementById('edit-winner-' + index).value;
    const newLoser = document.getElementById('edit-loser-' + index).value;
    if (!newWinner || !newLoser || newWinner === newLoser) {
      showMessage('Pick two different players!', 'error'); return;
    }
    data.matches[index].winner = newWinner;
    data.matches[index].loser = newLoser;
    save();
    editingMatch = null;
    showMessage('Match updated!', 'success');
    render();
  }

  function exportData() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gamestats_' + new Date().toLocaleDateString().replace(/\//g, '-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showMessage('Data exported successfully!', 'success');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (!imported.players || !imported.matches) {
          showMessage('Invalid file format!', 'error'); return;
        }
        if (!confirm('This will replace all current data. Are you sure?')) return;
        data = imported;
        save();
        showMessage('Data imported successfully! ' + data.players.length + ' players, ' + data.matches.length + ' matches.', 'success');
        render();
      } catch(err) {
        showMessage('Error reading file!', 'error');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function resetData() {
    if (!confirm('Reset ALL data? This cannot be undone!')) return;
    if (!confirm('Are you absolutely sure? All players and matches will be deleted!')) return;
    data = { players: [], matches: [] };
    save();
    showMessage('All data has been reset.', 'info');
    render();
  }

  function togglePlayer(name) {
    selectedPlayer = selectedPlayer === name ? null : name;
    render();
  }

  function render() {
    const playerOptions = data.players.map(p => `<option value="${p}">${p}</option>`).join('');

    // Summary box
    const sb = document.getElementById('summary-box');
    sb.innerHTML = `<div class="stats-box">
      <div><span>${data.players.length}</span><span>Players</span></div>
      <div><span>${data.matches.length}</span><span>Matches</span></div>
      <div><span>${data.players.length > 0 ? (data.matches.length / data.players.length).toFixed(1) : 0}</span><span>Avg per player</span></div>
    </div>`;

    // Leaderboard
    const sorted = [...data.players].sort((a, b) => {
      const sa = getStats(a), sb = getStats(b);
      return sb.pct - sa.pct || sb.wins - sa.wins;
    });

    const lb = document.getElementById('leaderboard');
    if (data.players.length === 0) {
      lb.innerHTML = '<div class="empty">No players yet.<br>Add some in the Players tab!</div>';
    } else {
      const medals = ['🥇','🥈','🥉'];
      lb.innerHTML = sorted.map((p, i) => {
        const s = getStats(p);
        const isSelected = selectedPlayer === p;
        let h2h = '';
        if (isSelected) {
          const others = data.players.filter(op => op !== p);
          h2h = `<div class="h2h"><p>Head to head:</p>` +
            others.map(op => {
              const h = getH2H(p, op);
              return `<div class="h2h-row"><span>vs ${op}</span><span><span class="win">${h.p1wins}W</span> / <span class="loss">${h.p2wins}L</span></span></div>`;
            }).join('') + '</div>';
        }
        return `<div class="card clickable ${isSelected ? 'selected' : ''}" onclick="togglePlayer('${p}')">
          <div class="row">
            <div style="display:flex;align-items:center">
              <span class="medal">${medals[i] || (i+1)+'.'}</span>
              <span style="font-weight:700;font-size:16px">${p}</span>
            </div>
            <div style="display:flex;gap:12px;align-items:center">
              <span class="win">${s.wins}W</span>
              <span class="loss">${s.losses}L</span>
              <span class="pct">${s.pct}%</span>
            </div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${s.pct}%"></div></div>
          ${h2h}
        </div>`;
      }).join('');
    }

    // Player selects
    document.getElementById('winner').innerHTML = '<option value="">Select winner...</option>' + playerOptions;
    document.getElementById('loser').innerHTML = '<option value="">Select loser...</option>' + playerOptions;

    // History
    const hl = document.getElementById('history-list');
    if (data.matches.length === 0) {
      hl.innerHTML = '<div class="empty">No matches logged yet!</div>';
    } else {
      hl.innerHTML = [...data.matches].reverse().map((m, ri) => {
        const i = data.matches.length - 1 - ri;
        const isEditing = editingMatch === i;
        let editSection = '';
        if (isEditing) {
          editSection = `<div class="edit-row">
            <select id="edit-winner-${i}">
              ${data.players.map(p => `<option value="${p}" ${p === m.winner ? 'selected' : ''}>${p}</option>`).join('')}
            </select>
            <select id="edit-loser-${i}">
              ${data.players.map(p => `<option value="${p}" ${p === m.loser ? 'selected' : ''}>${p}</option>`).join('')}
            </select>
            <button class="btn-small btn-save" onclick="saveEditMatch(${i})">Save</button>
          </div>`;
        }
        return `<div class="card">
          <div class="row">
            <span style="font-size:14px"><span class="win">${m.winner}</span> beat <span class="loss">${m.loser}</span></span>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="color:#475569;font-size:12px">${m.date}</span>
              <div class="btn-actions">
                <button class="btn-small btn-edit" onclick="startEditMatch(${i})">✏️</button>
                <button class="btn-small btn-delete" onclick="deleteMatch(${i})">🗑️</button>
              </div>
            </div>
          </div>
          ${editSection}
        </div>`;
      }).join('');
    }

    // Player list
    const pl = document.getElementById('player-list');
    if (data.players.length === 0) {
      pl.innerHTML = '<div class="empty">No players yet!</div>';
    } else {
      pl.innerHTML = data.players.map(p => {
        const s = getStats(p);
        const isEditing = editingPlayer === p;
        let editSection = '';
        if (isEditing) {
          editSection = `<div class="edit-row">
            <input id="edit-player-${p}" value="${p}" onkeydown="if(event.key==='Enter') saveEditPlayer('${p}')">
            <button class="btn-small btn-save" onclick="saveEditPlayer('${p}')">Save</button>
          </div>`;
        }
        return `<div class="card">
          <div class="row">
            <span style="font-weight:700">${p}</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="color:#94a3b8;font-size:13px">${s.total} matches · ${s.pct}% win</span>
              <div class="btn-actions">
                <button class="btn-small btn-edit" onclick="startEditPlayer('${p}')">✏️</button>
                <button class="btn-small btn-delete" onclick="deletePlayer('${p}')">🗑️</button>
              </div>
            </div>
          </div>
          ${editSection}
        </div>`;
      }).join('');
    }
  }

  render();
</script>
</body>
</html>
