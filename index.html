<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 Game Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 16px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 800; color: #38bdf8; text-align: center; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; text-align: center; margin-bottom: 24px; font-size: 14px; }
  .nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 24px; }
  .nav button { padding: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: all 0.2s; }
  .nav button.active { background: #38bdf8; color: #0f172a; }
  .nav button:not(.active) { background: #1e293b; color: #94a3b8; }
  .card { background: #1e293b; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid transparent; }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: #334155; }
  .card.selected { border-color: #38bdf8; }
  input, select { width: 100%; padding: 12px; border-radius: 8px; background: #1e293b; color: #f1f5f9; border: 1px solid #334155; font-size: 15px; margin-bottom: 16px; outline: none; }
  input:focus, select:focus { border-color: #38bdf8; }
  .btn { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
  .btn:hover { opacity: 0.9; }
  .btn-outline { width: 100%; padding: 14px; background: transparent; color: #38bdf8; border: 2px solid #38bdf8; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-outline:hover { background: #38bdf8; color: #0f172a; }
  .btn-danger { width: 100%; padding: 14px; background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
  .btn-small { padding: 6px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; }
  .btn-add { background: #38bdf8; color: #0f172a; }
  .btn-delete { background: #ef4444; color: white; }
  .btn-edit { background: #f59e0b; color: #0f172a; }
  .btn-save { background: #4ade80; color: #0f172a; }
  .btn-back { display: flex; align-items: center; gap: 8px; background: #1e293b; color: #94a3b8; border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
  .btn-back:hover { color: #f1f5f9; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .win { color: #4ade80; font-weight: 700; }
  .loss { color: #f87171; font-weight: 700; }
  .pct { background: #0f172a; border-radius: 6px; padding: 2px 8px; font-weight: 800; color: #38bdf8; font-size: 13px; }
  .message { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-weight: 600; }
  .message.info { background: #1e40af; color: #bfdbfe; }
  .message.success { background: #14532d; color: #86efac; }
  .message.error { background: #7f1d1d; color: #fca5a5; }
  .empty { text-align: center; color: #94a3b8; padding: 40px; }
  .medal { font-size: 20px; margin-right: 8px; }
  .section-title { color: #38bdf8; font-size: 16px; margin-bottom: 12px; font-weight: 700; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input { margin-bottom: 0; }
  label { color: #94a3b8; font-size: 13px; display: block; margin-bottom: 6px; }
  .tab { display: none; }
  .tab.active { display: block; }
  .bar-bg { background: #0f172a; border-radius: 4px; height: 6px; margin-top: 6px; }
  .bar-fill { background: #38bdf8; border-radius: 4px; height: 6px; transition: width 0.4s; }
  .edit-row { display: flex; gap: 6px; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
  .edit-row select, .edit-row input { margin-bottom: 0; flex: 1; padding: 8px; font-size: 13px; }
  .btn-actions { display: flex; gap: 6px; }
  .divider { border: none; border-top: 1px solid #334155; margin: 20px 0; }
  .stats-box { background: #0f172a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-around; text-align: center; }
  .stats-box div { display: flex; flex-direction: column; }
  .stats-box span:first-child { font-size: 22px; font-weight: 800; color: #38bdf8; }
  .stats-box span:last-child { font-size: 11px; color: #64748b; margin-top: 2px; }
  /* Language filter */
  .lang-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .lang-btn { padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; background: #1e293b; color: #94a3b8; transition: all 0.2s; }
  .lang-btn.active { background: #38bdf8; color: #0f172a; }
  /* Dropdown h2h */
  .h2h-dropdown { margin-top: 12px; border-top: 1px solid #334155; padding-top: 12px; }
  .h2h-overall { display: flex; justify-content: space-around; background: #0f172a; border-radius: 8px; padding: 10px; margin-bottom: 10px; text-align: center; }
  .h2h-overall div { display: flex; flex-direction: column; }
  .h2h-overall span:first-child { font-size: 18px; font-weight: 800; }
  .h2h-overall span:last-child { font-size: 10px; color: #64748b; }
  .h2h-opponent-row { display: flex; justify-content: space-between; align-items: center; background: #0f172a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: border 0.2s; border: 1px solid transparent; }
  .h2h-opponent-row:hover { border-color: #38bdf8; }
  .h2h-opponent-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .h2h-opponent-stats { display: flex; gap: 8px; align-items: center; font-size: 13px; }
  /* H2H Screen */
  .screen { display: none; }
  .screen.active { display: block; }
  .h2h-header { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
  .h2h-header-names { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 16px; }
  .h2h-header-player { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .h2h-header-player span:first-child { font-size: 18px; font-weight: 800; }
  .h2h-header-player span:last-child { font-size: 12px; color: #94a3b8; }
  .h2h-vs { font-size: 20px; font-weight: 800; color: #475569; }
  .h2h-score { display: flex; justify-content: center; gap: 24px; }
  .h2h-score-item { display: flex; flex-direction: column; align-items: center; }
  .h2h-score-item span:first-child { font-size: 28px; font-weight: 800; }
  .h2h-score-item span:last-child { font-size: 11px; color: #64748b; }
  .lang-tag { font-size: 16px; }
  .flag { font-size: 14px; }
  /* Player detail screen */
  .player-header { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .player-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .player-avatar { width: 52px; height: 52px; border-radius: 50%; background: #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #0f172a; flex-shrink: 0; }
  .player-header-info h2 { font-size: 20px; font-weight: 800; }
  .player-header-info span { color: #94a3b8; font-size: 13px; }
  .match-history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; font-size: 14px; }
  .match-history-item:last-child { border-bottom: none; }
  .result-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; }
  .result-win { background: #14532d; color: #4ade80; }
  .result-loss { background: #7f1d1d; color: #f87171; }
</style>
</head>
<body>
<div class="container">

  <!-- MAIN APP -->
  <div id="main-app">
    <h1>🎱 Game Stats</h1>
    <p class="subtitle">Track wins & losses with your colleagues</p>
    <div id="message" class="message info" style="display:none"></div>
    <div class="nav">
      <button class="active" onclick="switchTab('dashboard', this)">📊 Stats</button>
      <button onclick="switchTab('log', this)">➕ Log</button>
      <button onclick="switchTab('history', this)">📋 History</button>
      <button onclick="switchTab('players', this)">👥 Players</button>
    </div>

    <!-- STATS TAB -->
    <div id="tab-dashboard" class="tab active">
      <div id="summary-box"></div>
      <div class="section-title">🏆 Leaderboard</div>
      <div class="lang-filter" id="lang-filter"></div>
      <div id="leaderboard"></div>
    </div>

    <!-- LOG MATCH TAB -->
    <div id="tab-log" class="tab">
      <div class="section-title">Log a Match</div>
      <label>🏆 Winner</label>
      <select id="winner"><option value="">Select winner...</option></select>
      <label>💀 Loser</label>
      <select id="loser"><option value="">Select loser...</option></select>
      <button class="btn" onclick="logMatch()">Log Match</button>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab">
      <div class="section-title">📋 Match History</div>
      <div id="history-list"></div>
    </div>

    <!-- PLAYERS TAB -->
    <div id="tab-players" class="tab">
      <div class="section-title">Manage Players</div>
      <div class="input-row">
        <input id="newPlayer" placeholder="Player name..." onkeydown="if(event.key==='Enter') addPlayer()">
        <button class="btn-small btn-add" onclick="addPlayer()">Add</button>
      </div>
      <div id="player-list"></div>
      <hr class="divider">
      <div class="section-title">📤 Export & Import</div>
      <button class="btn-outline" onclick="exportData()">📤 Export Data</button>
      <label for="importFile" class="btn-outline" style="display:block;text-align:center;cursor:pointer;padding:14px;border-radius:10px;border:2px solid #38bdf8;color:#38bdf8;font-weight:800;font-size:16px;margin-bottom:10px;">📥 Import Data</label>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <hr class="divider">
      <button class="btn-danger" onclick="resetData()">🗑️ Reset All Data</button>
    </div>
  </div>

  <!-- H2H SCREEN -->
  <div id="h2h-screen" class="screen">
    <button class="btn-back" onclick="closeH2H()">← Back to Leaderboard</button>
    <div id="h2h-content"></div>
  </div>

</div>

<script>
  const LANGUAGES = [
    { code: 'en', label: 'English', flag: '🇬🇧' },
    { code: 'it', label: 'Italian', flag: '🇮🇹' },
    { code: 'fr', label: 'French', flag: '🇫🇷' },
    { code: 'de', label: 'German', flag: '🇩🇪' },
    { code: 'pt', label: 'Portuguese', flag: '🇵🇹' },
  ];

  let data = JSON.parse(localStorage.getItem('gamestats') || '{"players":[],"matches":[]}');
  // migrate old players to objects
  data.players = data.players.map(p => typeof p === 'string' ? { name: p, lang: '' } : p);

  let editingMatch = null;
  let editingPlayer = null;
  let selectedPlayer = null;
  let activeLang = 'all';

  function save() {
    localStorage.setItem('gamestats', JSON.stringify(data));
  }

  function showMessage(msg, type = 'info') {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = 'message ' + type;
    el.style.display = 'block';
    clearTimeout(window._msgTimer);
    window._msgTimer = setTimeout(() => el.style.display = 'none', 3000);
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    editingMatch = null;
    editingPlayer = null;
    render();
  }

  function getPlayerObj(name) {
    return data.players.find(p => p.name === name);
  }

  function getFlag(name) {
    const p = getPlayerObj(name);
    if (!p || !p.lang) return '';
    const l = LANGUAGES.find(l => l.code === p.lang);
    return l ? l.flag : '';
  }

  function getStats(name) {
    const wins = data.matches.filter(m => m.winner === name).length;
    const losses = data.matches.filter(m => m.loser === name).length;
    const total = wins + losses;
    const pct = total === 0 ? 0 : Math.round((wins / total) * 100);
    return { wins, losses, total, pct };
  }

  function getH2H(p1, p2) {
    const p1wins = data.matches.filter(m => m.winner === p1 && m.loser === p2).length;
    const p2wins = data.matches.filter(m => m.winner === p2 && m.loser === p1).length;
    const total = p1wins + p2wins;
    const pct = total === 0 ? 0 : Math.round((p1wins / total) * 100);
    return { p1wins, p2wins, total, pct };
  }

  function addPlayer() {
    const name = document.getElementById('newPlayer').value.trim();
    if (!name) return;
    if (data.players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      showMessage('Player already exists!', 'error'); return;
    }
    data.players.push({ name, lang: '' });
    save();
    document.getElementById('newPlayer').value = '';
    showMessage(name + ' added!', 'success');
    render();
  }

  function deletePlayer(name) {
    if (!confirm('Delete ' + name + '? Their match history will be kept.')) return;
    data.players = data.players.filter(p => p.name !== name);
    save();
    render();
  }

  function startEditPlayer(name) {
    editingPlayer = editingPlayer === name ? null : name;
    render();
    if (editingPlayer) {
      setTimeout(() => {
        const input = document.getElementById('edit-player-' + name);
        if (input) { input.focus(); input.select(); }
      }, 50);
    }
  }

  function saveEditPlayer(oldName) {
    const input = document.getElementById('edit-player-' + oldName);
    const langSelect = document.getElementById('edit-lang-' + oldName);
    const newName = input.value.trim();
    const newLang = langSelect.value;
    if (!newName) { showMessage('Name cannot be empty!', 'error'); return; }
    if (newName.toLowerCase() !== oldName.toLowerCase() && data.players.find(p => p.name.toLowerCase() === newName.toLowerCase())) {
      showMessage('Player already exists!', 'error'); return;
    }
    data.players = data.players.map(p => p.name === oldName ? { name: newName, lang: newLang } : p);
    data.matches = data.matches.map(m => ({
      ...m,
      winner: m.winner === oldName ? newName : m.winner,
      loser: m.loser === oldName ? newName : m.loser
    }));
    save();
    editingPlayer = null;
    showMessage('Player updated!', 'success');
    render();
  }

  function logMatch() {
    const winner = document.getElementById('winner').value;
    const loser = document.getElementById('loser').value;
    if (!winner || !loser || winner === loser) {
      showMessage('Pick two different players!', 'error'); return;
    }
    data.matches.push({ winner, loser, date: new Date().toLocaleDateString() });
    save();
    document.getElementById('winner').value = '';
    document.getElementById('loser').value = '';
    showMessage('Match logged! ✅', 'success');
    render();
  }

  function deleteMatch(index) {
    if (!confirm('Delete this match?')) return;
    data.matches.splice(index, 1);
    save();
    editingMatch = null;
    render();
  }

  function startEditMatch(index) {
    editingMatch = editingMatch === index ? null : index;
    render();
  }

  function saveEditMatch(index) {
    const newWinner = document.getElementById('edit-winner-' + index).value;
    const newLoser = document.getElementById('edit-loser-' + index).value;
    if (!newWinner || !newLoser || newWinner === newLoser) {
      showMessage('Pick two different players!', 'error'); return;
    }
    data.matches[index].winner = newWinner;
    data.matches[index].loser = newLoser;
    save();
    editingMatch = null;
    showMessage('Match updated!', 'success');
    render();
  }

  function openH2H(p1, p2) {
    selectedPlayer = null;
    const h = getH2H(p1, p2);
    const p1flag = getFlag(p1);
    const p2flag = getFlag(p2);
    const matches = data.matches.filter(m =>
      (m.winner === p1 && m.loser === p2) || (m.winner === p2 && m.loser === p1)
    ).reverse();

    const historyHTML = matches.length === 0
      ? '<div class="empty">No matches between these players yet.</div>'
      : matches.map(m => {
          const isP1Win = m.winner === p1;
          return `<div class="match-history-item">
            <span style="color:#94a3b8;font-size:12px">${m.date}</span>
            <span><span class="${isP1Win ? 'win' : 'loss'}">${m.winner}</span> beat <span class="${isP1Win ? 'loss' : 'win'}">${m.loser}</span></span>
            <span class="result-badge ${isP1Win ? 'result-win' : 'result-loss'}">${isP1Win ? 'W' : 'L'}</span>
          </div>`;
        }).join('');

    document.getElementById('h2h-content').innerHTML = `
      <div class="h2h-header">
        <div class="h2h-header-names">
          <div class="h2h-header-player">
            <span>${p1flag} ${p1}</span>
            <span>${h.p1wins} wins</span>
          </div>
          <div class="h2h-vs">VS</div>
          <div class="h2h-header-player">
            <span>${p2flag} ${p2}</span>
            <span>${h.p2wins} wins</span>
          </div>
        </div>
        <div class="h2h-score">
          <div class="h2h-score-item"><span class="win">${h.p1wins}</span><span>Wins</span></div>
          <div class="h2h-score-item"><span style="color:#94a3b8">${h.total}</span><span>Total</span></div>
          <div class="h2h-score-item"><span class="loss">${h.p2wins}</span><span>Wins</span></div>
        </div>
      </div>
      <div class="section-title">Match History</div>
      <div class="card">${historyHTML}</div>
    `;

    document.getElementById('main-app').style.display = 'none';
    document.getElementById('h2h-screen').classList.add('active');
  }

  function closeH2H() {
    document.getElementById('h2h-screen').classList.remove('active');
    document.getElementById('main-app').style.display = 'block';
    render();
  }

  function togglePlayer(name) {
    selectedPlayer = selectedPlayer === name ? null : name;
    render();
  }

  function exportData() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gamestats_' + new Date().toLocaleDateString().replace(/\//g, '-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showMessage('Data exported!', 'success');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (!imported.players || !imported.matches) { showMessage('Invalid file!', 'error'); return; }
        if (!confirm('This will replace all current data. Are you sure?')) return;
        data = imported;
        data.players = data.players.map(p => typeof p === 'string' ? { name: p, lang: '' } : p);
        save();
        showMessage('Imported! ' + data.players.length + ' players, ' + data.matches.length + ' matches.', 'success');
        render();
      } catch(err) { showMessage('Error reading file!', 'error'); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function resetData() {
    if (!confirm('Reset ALL data? This cannot be undone!')) return;
    if (!confirm('Are you absolutely sure?')) return;
    data = { players: [], matches: [] };
    save();
    showMessage('All data reset.', 'info');
    render();
  }

  function setLangFilter(lang) {
    activeLang = lang;
    selectedPlayer = null;
    render();
  }

  function render() {
    const playerNames = data.players.map(p => p.name);

    // Language filter buttons
    const lf = document.getElementById('lang-filter');
    const allBtn = `<button class="lang-btn ${activeLang === 'all' ? 'active' : ''}" onclick="setLangFilter('all')">🌍 All</button>`;
    const langBtns = LANGUAGES.map(l =>
      `<button class="lang-btn ${activeLang === l.code ? 'active' : ''}" onclick="setLangFilter('${l.code}')">${l.flag} ${l.label}</button>`
    ).join('');
    lf.innerHTML = allBtn + langBtns;

    // Filter players by language
    const filteredPlayers = activeLang === 'all'
      ? data.players
      : data.players.filter(p => p.lang === activeLang);

    // Summary box
    const sb = document.getElementById('summary-box');
    sb.innerHTML = `<div class="stats-box">
      <div><span>${data.players.length}</span><span>Players</span></div>
      <div><span>${data.matches.length}</span><span>Matches</span></div>
      <div><span>${data.players.length > 0 ? (data.matches.length / data.players.length).toFixed(1) : 0}</span><span>Avg/player</span></div>
    </div>`;

    // Leaderboard
    const sorted = [...filteredPlayers].sort((a, b) => {
      const sa = getStats(a.name), sb2 = getStats(b.name);
      return sb2.pct - sa.pct || sb2.wins - sa.wins;
    });

    const lb = document.getElementById('leaderboard');
    if (sorted.length === 0) {
      lb.innerHTML = '<div class="empty">No players found.</div>';
    } else {
      const medals = ['🥇','🥈','🥉'];
      lb.innerHTML = sorted.map((p, i) => {
        const s = getStats(p.name);
        const isSelected = selectedPlayer === p.name;
        const flag = getFlag(p.name);

        let dropdown = '';
        if (isSelected) {
          // Overall stats row
          const overallHTML = `<div class="h2h-overall">
            <div><span class="win">${s.wins}</span><span>Wins</span></div>
            <div><span style="color:#f1f5f9">${s.total}</span><span>Total</span></div>
            <div><span class="loss">${s.losses}</span><span>Losses</span></div>
            <div><span class="pct" style="background:transparent;padding:0">${s.pct}%</span><span>Win rate</span></div>
          </div>`;

          // Opponents sorted by most matches
          const opponents = playerNames
            .filter(op => op !== p.name)
            .map(op => ({ name: op, ...getH2H(p.name, op) }))
            .filter(op => op.total > 0)
            .sort((a, b) => b.total - a.total);

          const opponentsHTML = opponents.length === 0
            ? '<div style="color:#475569;font-size:13px;text-align:center;padding:8px">No matches yet</div>'
            : opponents.map(op => {
                const opFlag = getFlag(op.name);
                return `<div class="h2h-opponent-row" onclick="openH2H('${p.name}','${op.name}')">
                  <div class="h2h-opponent-name">${opFlag} ${op.name} <span style="color:#475569;font-size:11px">↗</span></div>
                  <div class="h2h-opponent-stats">
                    <span class="win">${op.p1wins}W</span>
                    <span class="loss">${op.p2wins}L</span>
                    <span class="pct">${op.pct}%</span>
                  </div>
                </div>`;
              }).join('');

          dropdown = `<div class="h2h-dropdown">
            ${overallHTML}
            <div style="color:#94a3b8;font-size:12px;margin-bottom:8px">Head to head — tap to see full history</div>
            ${opponentsHTML}
          </div>`;
        }

        return `<div class="card clickable ${isSelected ? 'selected' : ''}" onclick="togglePlayer('${p.name}')">
          <div class="row">
            <div style="display:flex;align-items:center">
              <span class="medal">${medals[i] || (i+1)+'.'}</span>
              <span style="font-weight:700;font-size:16px">${flag} ${p.name}</span>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <span class="win">${s.wins}W</span>
              <span class="loss">${s.losses}L</span>
              <span class="pct">${s.pct}%</span>
            </div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${s.pct}%"></div></div>
          ${dropdown}
        </div>`;
      }).join('');
    }

    // Player selects for log tab
    const playerOptions = data.players.map(p => `<option value="${p.name}">${getFlag(p.name)} ${p.name}</option>`).join('');
    document.getElementById('winner').innerHTML = '<option value="">Select winner...</option>' + playerOptions;
    document.getElementById('loser').innerHTML = '<option value="">Select loser...</option>' + playerOptions;

    // History
    const hl = document.getElementById('history-list');
    if (data.matches.length === 0) {
      hl.innerHTML = '<div class="empty">No matches logged yet!</div>';
    } else {
      hl.innerHTML = [...data.matches].reverse().map((m, ri) => {
        const i = data.matches.length - 1 - ri;
        const isEditing = editingMatch === i;
        let editSection = '';
        if (isEditing) {
          editSection = `<div class="edit-row">
            <select id="edit-winner-${i}">${data.players.map(p => `<option value="${p.name}" ${p.name === m.winner ? 'selected' : ''}>${p.name}</option>`).join('')}</select>
            <select id="edit-loser-${i}">${data.players.map(p => `<option value="${p.name}" ${p.name === m.loser ? 'selected' : ''}>${p.name}</option>`).join('')}</select>
            <button class="btn-small btn-save" onclick="saveEditMatch(${i})">Save</button>
          </div>`;
        }
        const wFlag = getFlag(m.winner);
        const lFlag = getFlag(m.loser);
        return `<div class="card">
          <div class="row">
            <span style="font-size:14px"><span class="win">${wFlag} ${m.winner}</span> beat <span class="loss">${lFlag} ${m.loser}</span></span>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="color:#475569;font-size:12px">${m.date}</span>
              <div class="btn-actions">
                <button class="btn-small btn-edit" onclick="startEditMatch(${i})">✏️</button>
                <button class="btn-small btn-delete" onclick="deleteMatch(${i})">🗑️</button>
              </div>
            </div>
          </div>
          ${editSection}
        </div>`;
      }).join('');
    }

    // Player list
    const pl = document.getElementById('player-list');
    if (data.players.length === 0) {
      pl.innerHTML = '<div class="empty">No players yet!</div>';
    } else {
      pl.innerHTML = data.players.map(p => {
        const s = getStats(p.name);
        const isEditing = editingPlayer === p.name;
        const langObj = LANGUAGES.find(l => l.code === p.lang);
        let editSection = '';
        if (isEditing) {
          const langOptions = `<option value="">No language</option>` +
            LANGUAGES.map(l => `<option value="${l.code}" ${p.lang === l.code ? 'selected' : ''}>${l.flag} ${l.label}</option>`).join('');
          editSection = `<div class="edit-row" style="flex-direction:column;gap:8px">
            <div style="display:flex;gap:6px">
              <input id="edit-player-${p.name}" value="${p.name}" onkeydown="if(event.key==='Enter') saveEditPlayer('${p.name}')" style="margin-bottom:0">
              <button class="btn-small btn-save" onclick="saveEditPlayer('${p.name}')">Save</button>
            </div>
            <select id="edit-lang-${p.name}" style="margin-bottom:0">${langOptions}</select>
          </div>`;
        }
        return `<div class="card">
          <div class="row">
            <span style="font-weight:700">${langObj ? langObj.flag : ''} ${p.name}</span>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="color:#94a3b8;font-size:13px">${s.total} matches · ${s.pct}% win</span>
              <div class="btn-actions">
                <button class="btn-small btn-edit" onclick="startEditPlayer('${p.name}')">✏️</button>
                <button class="btn-small btn-delete" onclick="deletePlayer('${p.name}')">🗑️</button>
              </div>
            </div>
          </div>
          ${editSection}
        </div>`;
      }).join('');
    }
  }

  render();
</script>
</body>
</html>
